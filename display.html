<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Display</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body { margin:0; font-family: Arial; text-align:center; transition:0.5s; }

.ready { background:#0b6623; color:white; }
.cooking { background:#b8860b; color:black; animation:pulse 1.5s infinite; }
.delayed { background:#8b0000; color:white; animation:flash 1s infinite; }
.hold { background:#111; color:white; }

@keyframes pulse { 0%{opacity:1;}50%{opacity:0.6;}100%{opacity:1;} }
@keyframes flash { 0%{opacity:1;}50%{opacity:0.4;}100%{opacity:1;} }

#nowServing {
  font-size:80px;
  transition:0.5s;
}

.overlay {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:70px;
  z-index:999;
}
</style>
</head>

<body id="screen">

<div id="overlay" class="overlay"></div>

<h1 id="nowServing">-</h1>

<h3>Up Next</h3>
<ul id="upNext"></ul>

<h3>Later</h3>
<ul id="later"></ul>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAx3iNl8g7niBW5bz0TWrrA73BXKYDCnIM",
  authDomain: "canteenqueue-61bfd.firebaseapp.com",
  projectId: "canteenqueue-61bfd",
});

const db = firebase.firestore();
const ref = db.collection("canteen").doc("queue");

let lastNow = "";

function cinematic(team) {
  let el = document.getElementById("nowServing");
  let ov = document.getElementById("overlay");

  ov.innerText = "NOW SERVING\n" + team;
  ov.style.display = "flex";

  setTimeout(() => ov.style.display="none", 1500);

  el.style.opacity = 0;
  setTimeout(()=>{
    el.innerText = team;
    el.style.opacity = 1;
  },300);
}

function setState(status, mode) {
  let s = document.getElementById("screen");

  s.className = "";

  if (mode === "hold") return s.classList.add("hold");
  if (status?.includes("Cooking")) return s.classList.add("cooking");
  if (status?.includes("Waiting") || status?.includes("Delayed")) return s.classList.add("delayed");

  s.classList.add("ready");
}

ref.onSnapshot(doc => {
  let d = doc.data() || {};

  if (d.now && d.now !== lastNow) {
    cinematic(d.now);
  }

  document.getElementById("upNext").innerHTML =
    d.queue?.length ? `<li>${d.queue[0]}</li>` : "";

  document.getElementById("later").innerHTML =
    d.queue?.slice(1).map(t=>`<li>${t}</li>`).join("");

  setState(d.status, d.mode);

  lastNow = d.now;
});
</script>

</body>
</html>
