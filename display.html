<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Canteen Display</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #CC1F1F;
  --blue: #1A3A8C;
  --gold: #F5B31B;
  --white: #FFFFFF;
}

body {
  font-family: 'Barlow Condensed', sans-serif;
  color: var(--white);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 24px;
  background: #0a0f0a;
}

/* WIDTH CONTROL */
.now-serving-card,
.section-card,
.menu-card,
.footer-note {
  width: 100%;
  max-width: 90vw;
}

/* TITLE */
.title-main {
  font-size: clamp(48px, 10vw, 110px);
  font-weight: 900;
  font-style: italic;
  text-align: center;
  line-height: 0.9;
}
.title-sub {
  text-align: center;
  margin-top: 8px;
  background: var(--blue);
  padding: 6px 24px;
  text-transform: uppercase;
  letter-spacing: 3px;
}

/* NOW SERVING */
.ns-red-bar {
  height: 16px;
  background: var(--red);
}

.ns-label-strip {
  background: white;
  color: var(--red);
  text-align: center;
  padding: 8px;
  font-weight: 700;
  letter-spacing: 4px;
}

.ns-team-block {
  background: var(--blue);
  padding: 20px;
  text-align: center;
}

.ns-team {
  font-size: clamp(80px, 14vw, 160px);
  font-weight: 900;
  font-style: italic;
  line-height: 0.9;
}

.ns-status-block {
  padding: 14px;
  text-align: center;
}

.ns-status {
  font-size: clamp(26px, 4vw, 48px);
  font-weight: 900;
}

/* QUEUE */
.queue-row-name {
  font-size: clamp(28px, 4vw, 44px);
}

/* FOOTER */
.footer-text {
  font-size: clamp(18px, 3vw, 28px);
  text-align: center;
  margin-top: 20px;
  color: var(--gold);
}

/* MENU */
.menu-card {
  margin-top: 24px;
}

.menu-header {
  text-align: center;
  padding: 10px;
  background: rgba(245,179,27,0.1);
  border: 2px solid rgba(245,179,27,0.4);
}

.menu-header-label {
  font-size: clamp(16px, 3vw, 22px);
  letter-spacing: 4px;
}

.menu-body {
  background: rgba(26,58,140,0.85);
  border: 2px solid rgba(245,179,27,0.35);
}

.menu-category-row {
  font-size: clamp(14px, 2.5vw, 18px);
  color: var(--gold);
  padding: 6px 16px;
}

.menu-item-row {
  padding: 10px 16px;
}

.menu-item-name {
  font-size: clamp(26px, 5vw, 46px);
}

.menu-item-desc {
  font-size: 14px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="title-main">Selection Night Dinner</div>
<div class="title-sub">Canteen Queue</div>

<div class="now-serving-card">
  <div class="ns-red-bar"></div>
  <div class="ns-label-strip">Now Serving</div>
  <div class="ns-team-block">
    <div class="ns-team" id="nowTeam">—</div>
  </div>
  <div class="ns-status-block">
    <div class="ns-status" id="statusText">On Time</div>
  </div>
</div>

<div class="section-card">
  <div id="upNextBody"></div>
</div>

<!-- FOOTER -->
<div class="footer-note">
  <div class="footer-text">
    If you're here outside your allocated time, please wait until your team is called.
  </div>
</div>

<!-- MENU NOW BELOW FOOTER -->
<div class="menu-card" id="menuCard" style="display:none;">
  <div class="menu-header">
    <div class="menu-header-label">Tonight's Menu</div>
  </div>
  <div class="menu-body" id="menuBody"></div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAx3iNl8g7niBW5bz0TWrrA73BXKYDCnIM",
  authDomain: "canteenqueue-61bfd.firebaseapp.com",
  projectId: "canteenqueue-61bfd",
});

const db = firebase.firestore();
const ref = db.collection("canteen").doc("queue");

ref.onSnapshot(doc => {
  const d = doc.data() || {};
  document.getElementById("nowTeam").textContent = d.now || "—";
  document.getElementById("statusText").textContent = d.status || "On Time";

  const queue = d.queue || [];
  const upBody = document.getElementById("upNextBody");
  upBody.innerHTML = queue.map(t => `<div class="queue-row-name">${t}</div>`).join("");

  const menu = d.menu || [];
  const card = document.getElementById("menuCard");
  const body = document.getElementById("menuBody");

  if (!menu.length) {
    card.style.display = "none";
    return;
  }

  card.style.display = "block";

  let html = "";
  let lastCat = null;

  menu.forEach(item => {
    const name = item.name || item;
    const desc = item.desc || "";
    const cat = item.category || "";

    if (cat && cat !== lastCat) {
      html += `<div class="menu-category-row">${cat}</div>`;
      lastCat = cat;
    }

    html += `
      <div class="menu-item-row">
        <div class="menu-item-name">${name}</div>
        ${desc ? `<div class="menu-item-desc">${desc}</div>` : ""}
      </div>
    `;
  });

  body.innerHTML = html;
});
</script>

</body>
</html>
