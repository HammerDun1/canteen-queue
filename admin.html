<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding:20px; }
button { margin:5px; padding:10px; }

#adminPanel { display:none; }

#loginBox {
  max-width:300px;
  margin:auto;
  margin-top:100px;
  text-align:center;
}

input { padding:10px; margin:10px; width:80%; }
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input type="password" id="pinInput" placeholder="Enter PIN" />
  <br>
  <button onclick="checkPIN()">Login</button>
</div>

<!-- ================= ADMIN ================= -->
<div id="adminPanel">

<h1>Admin Panel</h1>

<h3>Set Now Serving</h3>
<div id="buttons"></div>

<h3>Status</h3>
<button onclick="setStatus('Ready')">Ready</button>
<button onclick="setStatus('Waiting on Chips')">Waiting on Chips</button>
<button onclick="setStatus('Cooking')">Cooking</button>
<button onclick="setStatus('Delayed')">Delayed</button>

<h3>Queue Controls</h3>
<button onclick="clearQueue()">🧹 Clear Queue</button>

<hr>

<h3>Current Queue</h3>
<ul id="queueList"></ul>

</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const ref = db.collection("canteen").doc("queue");

// ================= PIN =================
const ADMIN_PIN = "1234"; // CHANGE THIS

function checkPIN() {
  let pin = document.getElementById("pinInput").value;
  if (pin === ADMIN_PIN) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong PIN");
  }
}

// ================= DEFAULT TEAMS =================
const defaultQueue = [
  "Women's & Bar",
  "Under 19s",
  "Reserves & Thirds",
  "Netballers",
  "Seniors & Coaches"
];

// ================= INIT =================
function initIfEmpty() {
  ref.get().then(doc => {
    if (!doc.exists) {
      ref.set({
        queue: defaultQueue,
        now: "-",
        status: "Ready"
      });
    }
  });
}
initIfEmpty();

// ================= UI =================
function render(data) {
  let list = document.getElementById("queueList");
  list.innerHTML = "";

  (data.queue || []).forEach((t, i) => {
    let li = document.createElement("li");
    li.innerHTML = `
      ${t}
      <button onclick="serve(${i})">Serve</button>
      <button onclick="removeItem(${i})">Remove</button>
    `;
    list.appendChild(li);
  });
}

ref.onSnapshot(doc => {
  render(doc.data() || {});
});

// ================= ACTIONS =================
function serve(i) {
  ref.get().then(doc => {
    let data = doc.data();
    let q = data.queue;

    let team = q[i];
    q.splice(i, 1);

    ref.set({
      now: team,
      queue: q
    }, { merge: true });
  });
}

function removeItem(i) {
  ref.get().then(doc => {
    let data = doc.data();
    let q = data.queue;
    q.splice(i, 1);

    ref.set({ queue: q }, { merge: true });
  });
}

function setStatus(status) {
  ref.set({ status }, { merge: true });
}

// ================= CLEAR QUEUE =================
function clearQueue() {
  ref.set({
    queue: [],
    now: "-",
    status: "Ready"
  }, { merge: true });
}

// ================= ADD BUTTONS =================
const teams = defaultQueue;

let btnDiv = document.getElementById("buttons");

teams.forEach((t, i) => {
  let btn = document.createElement("button");
  btn.innerText = t;
  btn.onclick = () => serve(i);
  btnDiv.appendChild(btn);
});
</script>

</body>
</html>
