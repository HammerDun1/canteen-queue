<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Canteen Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding: 20px; }

#adminPanel { display:none; }

button { padding:10px; margin:5px; }

.staff-mode button,
.staff-mode input {
  font-size: 22px;
  padding: 15px;
  width: 100%;
}

ul { padding-left: 20px; }

#loginBox {
  max-width: 300px;
  margin: 120px auto;
  text-align: center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input type="password" id="pin" placeholder="PIN">
  <br><br>
  <button onclick="checkPin()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">

<h1>Admin Panel</h1>

<h3>Add Team</h3>
<input id="newTeam" placeholder="Team name">
<button onclick="addTeam()">Add</button>

<h3>Controls</h3>

<button onclick="serveNext()">▶ Serve Next</button>
<button onclick="toggleHold()">⏸ Hold</button>
<button onclick="clearQueue()">🧹 Clear Queue</button>
<button onclick="toggleStaff()">🧑‍🍳 Staff Mode</button>

<h3>Status</h3>
<button onclick="setStatus('Ready')">Ready</button>
<button onclick="setStatus('Cooking')">Cooking</button>
<button onclick="setStatus('Waiting on Chips')">Waiting on Chips</button>
<button onclick="setStatus('Delayed')">Delayed</button>

<h3>Auto Mode</h3>
<input id="interval" type="number" value="30">
<button onclick="startAuto()">Start Auto</button>
<button onclick="stopAuto()">Stop Auto</button>

<h3>Queue</h3>
<ul id="queueList"></ul>

</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAx3iNl8g7niBW5bz0TWrrA73BXKYDCnIM",
  authDomain: "canteenqueue-61bfd.firebaseapp.com",
  projectId: "canteenqueue-61bfd",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const ref = db.collection("canteen").doc("queue");

// STATE
let autoTimer = null;
let holdMode = false;

// PIN
function checkPin() {
  if (document.getElementById("pin").value === "1234") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else alert("Wrong PIN");
}

// ADD TEAM
function addTeam() {
  let val = document.getElementById("newTeam").value;
  if (!val) return;

  ref.get().then(doc => {
    let q = doc.data().queue || [];
    q.push(val);
    ref.set({ queue: q }, { merge: true });
  });
}

// SERVE NEXT
function serveNext() {
  if (holdMode) return;

  ref.get().then(doc => {
    let q = doc.data().queue || [];
    if (!q.length) return;

    let next = q.shift();

    ref.set({
      now: next,
      queue: q
    }, { merge: true });
  });
}

// HOLD
function toggleHold() {
  holdMode = !holdMode;
  ref.set({ mode: holdMode ? "hold" : "manual" }, { merge: true });
}

// CLEAR
function clearQueue() {
  ref.set({ queue: [], now: "-", status: "Ready" }, { merge: true });
}

// STATUS
function setStatus(s) {
  ref.set({ status: s }, { merge: true });
}

// STAFF MODE
function toggleStaff() {
  document.body.classList.toggle("staff-mode");
}

// AUTO MODE
function startAuto() {
  let sec = parseInt(document.getElementById("interval").value || 30);

  if (autoTimer) clearInterval(autoTimer);

  autoTimer = setInterval(async () => {
    let d = await ref.get();
    let data = d.data() || {};

    if (holdMode) return;
    if (!data.queue?.length) return;

    if (
      data.status?.includes("Waiting") ||
      data.status?.includes("Cooking") ||
      data.status?.includes("Delayed")
    ) return;

    serveNext();
  }, sec * 1000);
}

function stopAuto() {
  clearInterval(autoTimer);
}

// LIVE QUEUE
ref.onSnapshot(doc => {
  let data = doc.data() || {};
  let list = document.getElementById("queueList");

  list.innerHTML = "";

  (data.queue || []).forEach((t, i) => {
    list.innerHTML += `
      <li>
        ${t}
        <button onclick="serveIndex(${i})">Serve</button>
        <button onclick="removeIndex(${i})">X</button>
      </li>
    `;
  });
});

function serveIndex(i) {
  ref.get().then(doc => {
    let q = doc.data().queue;
    let t = q.splice(i,1)[0];

    ref.set({ now: t, queue: q }, { merge:true });
  });
}

function removeIndex(i) {
  ref.get().then(doc => {
    let q = doc.data().queue;
    q.splice(i,1);
    ref.set({ queue: q }, { merge:true });
  });
}
</script>

</body>
</html>
