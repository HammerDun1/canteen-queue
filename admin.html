<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canteen Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #CC1F1F;
    --red-dark: #9B1515;
    --blue: #1A3A8C;
    --blue-mid: #1D4ED8;
    --gold: #F5B31B;
    --white: #FFFFFF;
    --dark: #0D0D0D;
    --panel: #111827;
    --border: rgba(255,255,255,0.12);
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    background-image: repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.015) 20px,rgba(255,255,255,0.015) 40px);
  }

  /* LOGIN */
  #loginBox { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
  .login-title {
    font-family:'Barlow Condensed',sans-serif; font-size:clamp(64px,12vw,110px); font-weight:900;
    font-style:italic; line-height:0.85; text-transform:uppercase; text-align:center;
    text-shadow:4px 4px 0 var(--red-dark); letter-spacing:-2px; margin-bottom:8px;
  }
  .login-subtitle {
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic;
    font-size:clamp(24px,5vw,42px); text-transform:uppercase; background:var(--blue);
    padding:6px 32px; letter-spacing:3px; margin-bottom:40px; position:relative;
  }
  .login-subtitle::before,.login-subtitle::after {
    content:''; position:absolute; top:50%; transform:translateY(-50%);
    width:0; height:0; border-top:20px solid transparent; border-bottom:20px solid transparent;
  }
  .login-subtitle::before { right:100%; border-right:16px solid var(--blue); }
  .login-subtitle::after  { left:100%;  border-left:16px solid var(--blue); }
  .login-card {
    background:var(--panel); border:2px solid var(--border); border-top:4px solid var(--red);
    padding:36px 40px; width:320px; text-align:center;
  }
  .login-card label {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px;
    letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.5); display:block; margin-bottom:10px;
  }
  .login-card input {
    width:100%; background:rgba(255,255,255,0.07); border:1.5px solid var(--border);
    color:var(--white); font-family:'Barlow Condensed',sans-serif; font-size:28px;
    font-weight:700; letter-spacing:8px; text-align:center; padding:14px; outline:none;
    margin-bottom:16px; transition:border-color 0.2s;
  }
  .login-card input:focus { border-color:var(--blue-mid); }
  .btn-login {
    width:100%; background:var(--red); color:var(--white);
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic;
    font-size:22px; letter-spacing:2px; text-transform:uppercase; border:none;
    padding:14px; cursor:pointer; transition:background 0.15s,transform 0.1s;
  }
  .btn-login:hover { background:var(--red-dark); }
  .btn-login:active { transform:scale(0.98); }

  /* ADMIN */
  #adminPanel { display:none; }
  .top-bar {
    background:var(--red); padding:0 24px; display:flex; align-items:center;
    justify-content:space-between; height:60px; border-bottom:4px solid var(--red-dark);
  }
  .top-bar-title {
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic;
    font-size:28px; letter-spacing:2px; text-transform:uppercase;
  }
  .top-bar-right { display:flex; align-items:center; gap:8px; }
  .live-dot { width:10px; height:10px; border-radius:50%; background:var(--gold); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .live-label { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:2px; color:rgba(255,255,255,0.85); }

  .layout { display:grid; grid-template-columns:340px 1fr; min-height:calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar {
    background:var(--panel); border-right:1px solid var(--border);
    padding:24px 20px; display:flex; flex-direction:column; gap:20px; overflow-y:auto;
  }
  .section-label {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px;
    letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:10px;
  }
  .add-row { display:flex; gap:8px; }
  .add-row input {
    flex:1; background:rgba(255,255,255,0.06); border:1.5px solid var(--border);
    color:var(--white); font-family:'Barlow',sans-serif; font-size:15px;
    padding:10px 14px; outline:none; transition:border-color 0.2s;
  }
  .add-row input::placeholder { color:rgba(255,255,255,0.25); }
  .add-row input:focus { border-color:var(--blue-mid); }

  .btn {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic;
    font-size:14px; letter-spacing:1px; text-transform:uppercase; border:none;
    padding:10px 18px; cursor:pointer; transition:filter 0.15s,transform 0.1s; white-space:nowrap;
  }
  .btn:active { transform:scale(0.97); }
  .btn:hover { filter:brightness(1.15); }
  .btn-blue  { background:var(--blue); color:var(--white); }
  .btn-red   { background:var(--red); color:var(--white); }
  .btn-gold  { background:var(--gold); color:var(--dark); }
  .btn-ghost { background:transparent; border:1.5px solid var(--border); color:rgba(255,255,255,0.6); }
  .btn-ghost:hover { border-color:rgba(255,255,255,0.4); color:var(--white); filter:none; }
  .btn-ghost.active { border-color:var(--gold); color:var(--gold); }
  .btn-group { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

  .status-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .btn-status {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic;
    font-size:14px; letter-spacing:1px; text-transform:uppercase;
    border:2px solid var(--border); background:rgba(255,255,255,0.04);
    color:rgba(255,255,255,0.55); padding:14px 12px; cursor:pointer; transition:all 0.2s; text-align:center;
  }
  .btn-status:hover { background:rgba(255,255,255,0.1); color:var(--white); }
  .btn-status[data-status="On Time"].active-status           { border-color:#2ecc71; color:#2ecc71; background:rgba(46,204,113,0.12); animation:status-glow-green 1.8s ease-in-out infinite; }
  .btn-status[data-status="Cooking"].active-status           { border-color:#f39c12; color:#f39c12; background:rgba(243,156,18,0.12); }
  .btn-status[data-status="Waiting on Chips"].active-status  { border-color:#f1c40f; color:#f1c40f; background:rgba(241,196,15,0.12); }
  .btn-status[data-status="Delayed"].active-status           { border-color:var(--red); color:#ff5555; background:rgba(204,31,31,0.15); animation:status-flash-delayed 0.8s ease-in-out infinite; }
  @keyframes status-glow-green    { 0%,100%{box-shadow:0 0 0 0 rgba(46,204,113,0);}  50%{box-shadow:0 0 12px 2px rgba(46,204,113,0.4);} }
  @keyframes status-flash-delayed { 0%,100%{background:rgba(204,31,31,0.15);} 50%{background:rgba(204,31,31,0.35);} }

  .auto-row { display:flex; gap:8px; align-items:center; }
  .auto-row input[type="number"] {
    width:70px; background:rgba(255,255,255,0.06); border:1.5px solid var(--border);
    color:var(--white); font-family:'Barlow Condensed',sans-serif; font-size:20px;
    font-weight:700; text-align:center; padding:8px; outline:none;
  }
  .auto-label { font-size:13px; color:rgba(255,255,255,0.4); font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; }
  .auto-indicator {
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:2px;
    text-transform:uppercase; color:rgba(255,255,255,0.3); margin-left:auto;
  }
  .auto-indicator .dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.2); }
  .auto-indicator.running { color:var(--gold); }
  .auto-indicator.running .dot { background:var(--gold); animation:pulse 1s infinite; }

  /* MAIN */
  .main { padding:28px 32px; overflow-y:auto; }

  /* Now Serving */
  .now-serving-block {
    background:var(--white); border-top:5px solid var(--red);
    padding:20px 28px 24px; margin-bottom:24px; position:relative;
  }
  .now-label {
    display:flex; align-items:center; gap:12px;
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px;
    letter-spacing:4px; text-transform:uppercase; margin-bottom:8px;
  }
  .now-label-text { color:var(--red); font-style:italic; white-space:nowrap; }
  .now-rule { flex:1; height:2px; background:var(--red); animation:rulepulse 1.5s ease-in-out infinite; }
  @keyframes rulepulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
  .now-team {
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic;
    font-size:clamp(36px,5vw,56px); text-transform:uppercase; letter-spacing:-1px; line-height:1; color:var(--blue);
  }
  .status-badge {
    display:inline-block; margin-top:12px; font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:18px; letter-spacing:2px; text-transform:uppercase;
    background:var(--gold); color:var(--dark); padding:6px 20px;
  }
  .serve-next-btn {
    position:absolute; right:28px; bottom:24px;
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic;
    font-size:18px; letter-spacing:1px; text-transform:uppercase;
    background:var(--red); color:var(--white); border:none; padding:12px 28px;
    cursor:pointer; transition:background 0.15s,transform 0.1s;
  }
  .serve-next-btn:hover { background:var(--red-dark); }
  .serve-next-btn:active { transform:scale(0.97); }

  /* Queue */
  .queue-heading { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .queue-heading h2 {
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic;
    font-size:22px; letter-spacing:2px; text-transform:uppercase;
  }
  .queue-count {
    background:var(--red); color:var(--white); font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:14px; padding:2px 10px; border-radius:2px;
  }
  .reorder-hint {
    margin-left:auto; font-family:'Barlow Condensed',sans-serif; font-size:11px;
    letter-spacing:2px; color:rgba(255,255,255,0.25); text-transform:uppercase;
  }
  .queue-list { list-style:none; display:flex; flex-direction:column; gap:6px; }
  .queue-item {
    display:flex; align-items:center; background:var(--panel);
    border:1px solid var(--border); border-left:4px solid var(--blue);
    padding:12px 16px; gap:12px; transition:border-left-color 0.2s,background 0.15s;
    cursor:grab; user-select:none; touch-action:none;
  }
  .queue-item:hover { border-left-color:var(--gold); }
  .queue-item.dragging { opacity:0.35; cursor:grabbing; }
  .queue-item.drag-over { border-left-color:var(--gold); background:rgba(245,179,27,0.07); }
  .queue-item.touch-dragging-ghost {
    position:fixed; z-index:1000; pointer-events:none;
    opacity:0.9; border-left-color:var(--gold);
    box-shadow:0 8px 32px rgba(0,0,0,0.6);
    left:0; top:0;
  }
  .drag-handle {
    display:flex; flex-direction:column; gap:3px; align-items:center;
    color:rgba(255,255,255,0.4); padding:0 4px; cursor:grab; flex-shrink:0;
    min-width:32px; min-height:44px; justify-content:center;
  }
  .drag-handle span { display:block; width:14px; height:2px; background:currentColor; border-radius:2px; }
  .queue-num {
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:20px;
    color:rgba(255,255,255,0.2); min-width:28px;
  }
  .queue-name {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic;
    font-size:20px; text-transform:uppercase; letter-spacing:1px; flex:1;
  }
  .queue-actions { display:flex; gap:6px; }
  .queue-actions button {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px;
    letter-spacing:1px; text-transform:uppercase; border:none; padding:6px 12px;
    cursor:pointer; transition:filter 0.15s,transform 0.1s; min-height:40px;
  }
  .queue-actions button:active { transform:scale(0.96); }
  .btn-serve-q { background:var(--blue); color:var(--white); }
  .btn-serve-q:hover { filter:brightness(1.2); }
  .btn-remove-q { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.45); }
  .btn-remove-q:hover { background:var(--red); color:var(--white); filter:none; }
  .queue-empty {
    font-family:'Barlow Condensed',sans-serif; font-size:16px; color:rgba(255,255,255,0.2);
    letter-spacing:2px; text-transform:uppercase; text-align:center; padding:40px 0;
    border:1.5px dashed rgba(255,255,255,0.08);
  }

  /* ── MENU MANAGEMENT ── */
  .menu-section { margin-top: 32px; }
  .menu-section-heading {
    display:flex; align-items:center; gap:12px; margin-bottom:16px;
  }
  .menu-section-heading h2 {
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic;
    font-size:22px; letter-spacing:2px; text-transform:uppercase;
  }
  .menu-add-row { display:flex; gap:8px; margin-bottom:8px; flex-wrap: wrap; }
  .menu-add-row input {
    background:rgba(255,255,255,0.06); border:1.5px solid var(--border);
    color:var(--white); font-family:'Barlow',sans-serif; font-size:15px;
    padding:10px 14px; outline:none; transition:border-color 0.2s;
  }
  .menu-add-row input:focus { border-color:var(--gold); }
  .menu-add-row input.inp-name { flex: 2; min-width: 140px; }
  .menu-add-row input.inp-desc { flex: 3; min-width: 140px; }
  .menu-add-row input.inp-cat  { flex: 1.5; min-width: 110px; }
  .menu-add-row input::placeholder { color:rgba(255,255,255,0.25); }

  .menu-list { display:flex; flex-direction:column; gap:6px; }
  .menu-item-admin {
    display:flex; align-items:center; gap:12px;
    background:var(--panel); border:1px solid var(--border); border-left:4px solid var(--gold);
    padding:10px 14px;
  }
  .menu-item-admin-info { flex:1; }
  .menu-item-admin-name {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic;
    font-size:18px; text-transform:uppercase; color:var(--white);
  }
  .menu-item-admin-meta {
    font-family:'Barlow',sans-serif; font-size:12px; color:rgba(255,255,255,0.4);
    margin-top:2px;
  }
  .menu-item-admin-cat {
    font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; color:var(--gold); opacity:0.7;
    margin-right: 8px;
  }
  .btn-remove-menu {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px;
    letter-spacing:1px; text-transform:uppercase; border:none; padding:6px 12px;
    cursor:pointer; min-height:36px; background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.45);
    transition:background 0.15s;
  }
  .btn-remove-menu:hover { background:var(--red); color:var(--white); }
  .menu-empty-admin {
    font-family:'Barlow Condensed',sans-serif; font-size:15px; color:rgba(255,255,255,0.2);
    letter-spacing:2px; text-transform:uppercase; text-align:center; padding:30px 0;
    border:1.5px dashed rgba(255,255,255,0.08);
  }
  .menu-clear-btn { margin-top: 10px; }

  .hold-banner {
    display:none; background:var(--gold); color:var(--dark); text-align:center;
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic;
    font-size:16px; letter-spacing:3px; text-transform:uppercase; padding:8px;
  }
  .hold-banner.visible { display:block; }
  .divider { height:1px; background:var(--border); margin:4px 0; }

  body.staff-mode .btn,body.staff-mode .btn-status,
  body.staff-mode .add-row input,body.staff-mode .auto-row input { font-size:20px; padding:18px 24px; }

  @media (max-width:700px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { border-right:none; border-bottom:1px solid var(--border); }
    .main { padding:16px; }
    .serve-next-btn { position:static; margin-top:16px; width:100%; }
    .now-serving-block { padding-bottom:16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login-title">CANTEEN<br>ADMIN</div>
  <div class="login-subtitle">Staff Access</div>
  <div class="login-card">
    <label>Enter PIN</label>
    <input type="password" id="pin" placeholder="••••" maxlength="6" onkeydown="if(event.key==='Enter')checkPin()">
    <button class="btn-login" onclick="checkPin()">Login ▶</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <div class="top-bar">
    <div class="top-bar-title">Canteen Admin</div>
    <div class="top-bar-right">
      <div class="live-dot"></div>
      <div class="live-label">LIVE</div>
      <button class="btn btn-ghost" style="margin-left:12px;" onclick="toggleStaff()">Staff Mode</button>
    </div>
  </div>

  <div id="holdBanner" class="hold-banner">⏸ QUEUE ON HOLD</div>

  <div class="layout">
    <div class="sidebar">

      <div>
        <div class="section-label">Add Team</div>
        <div class="add-row">
          <input id="newTeam" placeholder="Team name…" onkeydown="if(event.key==='Enter')addTeam()">
          <button class="btn btn-blue" onclick="addTeam()">Add</button>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-label">Queue Controls</div>
        <div class="btn-group">
          <button class="btn btn-red" onclick="serveNext()">▶ Serve Next</button>
          <button class="btn btn-ghost" id="holdBtn" onclick="toggleHold()">⏸ Hold</button>
          <button class="btn btn-ghost" onclick="clearQueue()">🧹 Clear All</button>
          <button class="btn btn-ghost" onclick="toggleStaff()">🧑‍🍳 Staff Mode</button>
        </div>
        <button class="btn btn-blue" style="width:100%;margin-top:8px;" onclick="prepopulateQueue()">📋 Load Tonight's Order</button>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-label">Kitchen Status</div>
        <div class="status-grid">
          <button class="btn-status" onclick="setStatus('On Time')" data-status="On Time">✅ On Time</button>
          <button class="btn-status" onclick="setStatus('Cooking')" data-status="Cooking">🔥 Cooking</button>
          <button class="btn-status" onclick="setStatus('Waiting on Chips')" data-status="Waiting on Chips">🍟 Waiting</button>
          <button class="btn-status" onclick="setStatus('Delayed')" data-status="Delayed">⚠️ Delayed</button>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-label">Auto Mode</div>
        <div class="auto-row">
          <input id="interval" type="number" value="15" min="1" max="120">
          <div class="auto-label">min</div>
          <div class="auto-indicator" id="autoIndicator"><div class="dot"></div>OFF</div>
        </div>
        <div class="btn-group" style="margin-top:10px;">
          <button class="btn btn-gold" onclick="startAuto()">▶ Start Auto</button>
          <button class="btn btn-ghost" onclick="stopAuto()">■ Stop</button>
        </div>
      </div>

    </div>

    <div class="main">

      <!-- Now Serving -->
      <div class="now-serving-block">
        <div class="now-label">
          <div class="now-rule"></div>
          <span class="now-label-text">Now Serving</span>
          <div class="now-rule"></div>
        </div>
        <div class="now-team" id="nowTeam">—</div>
        <div class="status-badge" id="statusBadge">On Time</div>
        <button class="serve-next-btn" onclick="serveNext()">▶ Serve Next</button>
      </div>

      <!-- Queue -->
      <div class="queue-heading">
        <h2>Up Next</h2>
        <div class="queue-count" id="queueCount">0</div>
        <div class="reorder-hint">⠿ drag to reorder</div>
      </div>
      <ul class="queue-list" id="queueList">
        <li class="queue-empty">Queue is empty</li>
      </ul>

      <!-- Menu Management -->
      <div class="menu-section">
        <div class="menu-section-heading">
          <h2>Tonight's Menu</h2>
          <div class="queue-count" id="menuCount" style="background:var(--gold);color:var(--dark);">0</div>
        </div>

        <div class="menu-add-row">
          <input class="inp-name" id="menuItemName" placeholder="Item name…" onkeydown="if(event.key==='Enter')addMenuItem()">
          <input class="inp-desc" id="menuItemDesc" placeholder="Description (optional)…">
          <input class="inp-cat"  id="menuItemCat"  placeholder="Category (optional)…">
          <button class="btn btn-gold" onclick="addMenuItem()">Add</button>
        </div>

        <div class="menu-list" id="menuList">
          <div class="menu-empty-admin">No menu items yet</div>
        </div>

        <button class="btn btn-ghost menu-clear-btn" onclick="clearMenu()">🗑 Clear Entire Menu</button>
      </div>

    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAx3iNl8g7niBW5bz0TWrrA73BXKYDCnIM",
  authDomain: "canteenqueue-61bfd.firebaseapp.com",
  projectId: "canteenqueue-61bfd",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const ref = db.collection("canteen").doc("queue");

const DEFAULT_QUEUE = [
  "Women's & Bar",
  "Under 19s",
  "Reserves & Thirds",
  "Netballers",
  "Seniors & Coaches"
];

let autoTimer = null;
let holdMode = false;
let currentQueue = [];
let currentMenu = [];

// ── MOUSE DRAG ────────────────────────────────────────────────────────────
let dragSrcIndex = null;

function setupMouseDrag(items) {
  items.forEach((item, i) => {
    item.setAttribute("draggable", true);
    item.addEventListener("dragstart", e => {
      dragSrcIndex = i; item.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    item.addEventListener("dragend", () => items.forEach(el => el.classList.remove("dragging","drag-over")));
    item.addEventListener("dragover", e => {
      e.preventDefault(); e.dataTransfer.dropEffect = "move";
      items.forEach(el => el.classList.remove("drag-over"));
      item.classList.add("drag-over");
    });
    item.addEventListener("dragleave", () => item.classList.remove("drag-over"));
    item.addEventListener("drop", e => {
      e.preventDefault();
      if (dragSrcIndex === null || dragSrcIndex === i) return;
      let q = [...currentQueue];
      const moved = q.splice(dragSrcIndex, 1)[0];
      q.splice(i, 0, moved);
      dragSrcIndex = null;
      ref.set({ queue: q }, { merge: true });
    });
  });
}

// ── TOUCH DRAG ────────────────────────────────────────────────────────────
let touchDragIndex = null;
let touchGhost = null;
let touchOffsetX = 0;
let touchOffsetY = 0;

function setupTouchDrag(items) {
  items.forEach((item, i) => {
    const handle = item.querySelector(".drag-handle");
    if (!handle) return;

    handle.addEventListener("touchstart", e => {
      e.preventDefault();
      touchDragIndex = i;
      const touch = e.touches[0];
      const rect = item.getBoundingClientRect();
      touchOffsetX = touch.clientX - rect.left;
      touchOffsetY = touch.clientY - rect.top;
      touchGhost = item.cloneNode(true);
      touchGhost.classList.add("touch-dragging-ghost");
      touchGhost.style.width = rect.width + "px";
      touchGhost.style.transform = `translate(${rect.left}px, ${rect.top}px)`;
      document.body.appendChild(touchGhost);
      item.style.opacity = "0.3";
    }, { passive: false });

    handle.addEventListener("touchmove", e => {
      e.preventDefault();
      if (!touchGhost) return;
      const touch = e.touches[0];
      touchGhost.style.transform = `translate(${touch.clientX - touchOffsetX}px, ${touch.clientY - touchOffsetY}px)`;
      items.forEach(el => el.classList.remove("drag-over"));
      items.forEach((el, idx) => {
        if (idx === touchDragIndex) return;
        const r = el.getBoundingClientRect();
        if (touch.clientY >= r.top && touch.clientY < r.top + r.height) el.classList.add("drag-over");
      });
    }, { passive: false });

    handle.addEventListener("touchend", e => {
      if (touchGhost) { touchGhost.remove(); touchGhost = null; }
      items.forEach(el => { el.classList.remove("drag-over"); el.style.opacity = ""; });
      if (touchDragIndex === null) return;
      const touch = e.changedTouches[0];
      let targetIndex = null;
      items.forEach((el, idx) => {
        const r = el.getBoundingClientRect();
        if (touch.clientY >= r.top && touch.clientY < r.top + r.height) targetIndex = idx;
      });
      if (targetIndex !== null && targetIndex !== touchDragIndex) {
        let q = [...currentQueue];
        const moved = q.splice(touchDragIndex, 1)[0];
        q.splice(targetIndex, 0, moved);
        ref.set({ queue: q }, { merge: true });
      }
      touchDragIndex = null;
    });
  });
}

// ── QUEUE CONTROLS ────────────────────────────────────────────────────────
function checkPin() {
  if (document.getElementById("pin").value === "1234") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    document.getElementById("pin").style.borderColor = "#CC1F1F";
    setTimeout(() => document.getElementById("pin").style.borderColor = "", 800);
  }
}

function prepopulateQueue() {
  ref.get().then(doc => {
    let existing = doc.data()?.queue || [];
    if (existing.length && !confirm("This will replace the current queue. Continue?")) return;
    ref.set({ queue: [...DEFAULT_QUEUE] }, { merge: true });
  });
}

function addTeam() {
  let val = document.getElementById("newTeam").value.trim();
  if (!val) return;
  ref.get().then(doc => {
    let q = doc.data()?.queue || [];
    q.push(val);
    ref.set({ queue: q }, { merge: true });
    document.getElementById("newTeam").value = "";
  });
}

function serveNext() {
  if (holdMode) return;
  ref.get().then(doc => {
    let q = doc.data()?.queue || [];
    if (!q.length) return;
    let next = q.shift();
    ref.set({ now: next, queue: q }, { merge: true });
  });
}

function toggleHold() {
  holdMode = !holdMode;
  ref.set({ mode: holdMode ? "hold" : "manual" }, { merge: true });
  document.getElementById("holdBtn").classList.toggle("active", holdMode);
  document.getElementById("holdBanner").classList.toggle("visible", holdMode);
}

function clearQueue() {
  if (!confirm("Clear the entire queue?")) return;
  ref.set({ queue: [], now: "—", status: "On Time" }, { merge: true });
}

function setStatus(s) {
  ref.set({ status: s }, { merge: true });
  document.querySelectorAll(".btn-status").forEach(b => {
    b.classList.toggle("active-status", b.dataset.status === s);
  });
}

function toggleStaff() { document.body.classList.toggle("staff-mode"); }

function startAuto() {
  let mins = parseInt(document.getElementById("interval").value) || 15;
  if (autoTimer) clearInterval(autoTimer);
  document.getElementById("autoIndicator").className = "auto-indicator running";
  document.getElementById("autoIndicator").innerHTML = '<div class="dot"></div>ON';
  serveNext();
  autoTimer = setInterval(async () => {
    let d = await ref.get();
    let data = d.data() || {};
    if (holdMode || !data.queue?.length) return;
    let s = data.status || "";
    if (s.includes("Waiting") || s.includes("Cooking") || s.includes("Delayed")) return;
    serveNext();
  }, mins * 60 * 1000);
}

function stopAuto() {
  clearInterval(autoTimer); autoTimer = null;
  document.getElementById("autoIndicator").className = "auto-indicator";
  document.getElementById("autoIndicator").innerHTML = '<div class="dot"></div>OFF';
}

function serveIndex(i) {
  ref.get().then(doc => {
    let q = doc.data()?.queue || [];
    let t = q.splice(i, 1)[0];
    ref.set({ now: t, queue: q }, { merge: true });
  });
}

function removeIndex(i) {
  ref.get().then(doc => {
    let q = doc.data()?.queue || [];
    q.splice(i, 1);
    ref.set({ queue: q }, { merge: true });
  });
}

// ── MENU CONTROLS ─────────────────────────────────────────────────────────
function addMenuItem() {
  const name = document.getElementById("menuItemName").value.trim();
  if (!name) return;
  const desc = document.getElementById("menuItemDesc").value.trim();
  const cat  = document.getElementById("menuItemCat").value.trim();

  const item = { name };
  if (desc) item.desc = desc;
  if (cat)  item.category = cat;

  ref.get().then(doc => {
    const menu = doc.data()?.menu || [];
    menu.push(item);
    ref.set({ menu }, { merge: true });
    document.getElementById("menuItemName").value = "";
    document.getElementById("menuItemDesc").value = "";
    document.getElementById("menuItemCat").value  = "";
  });
}

function removeMenuItem(i) {
  ref.get().then(doc => {
    const menu = doc.data()?.menu || [];
    menu.splice(i, 1);
    ref.set({ menu }, { merge: true });
  });
}

function clearMenu() {
  if (!confirm("Clear the entire menu?")) return;
  ref.set({ menu: [] }, { merge: true });
}

function renderAdminMenu(items) {
  const list = document.getElementById("menuList");
  document.getElementById("menuCount").textContent = items.length;
  if (!items.length) {
    list.innerHTML = '<div class="menu-empty-admin">No menu items yet</div>';
    return;
  }
  list.innerHTML = items.map((item, i) => {
    const name = typeof item === "string" ? item : item.name;
    const desc = typeof item === "string" ? "" : (item.desc || "");
    const cat  = typeof item === "string" ? "" : (item.category || "");
    return `
      <div class="menu-item-admin">
        <div class="menu-item-admin-info">
          ${cat ? `<span class="menu-item-admin-cat">${cat}</span>` : ""}
          <span class="menu-item-admin-name">${name}</span>
          ${desc ? `<div class="menu-item-admin-meta">${desc}</div>` : ""}
        </div>
        <button class="btn-remove-menu" onclick="removeMenuItem(${i})">✕</button>
      </div>`;
  }).join("");
}

// ── FIREBASE LISTENER ─────────────────────────────────────────────────────
ref.onSnapshot(doc => {
  const data = doc.data() || {};
  const q = data.queue || [];
  const menu = data.menu || [];
  currentQueue = q;
  currentMenu = menu;

  document.getElementById("nowTeam").textContent = data.now || "—";
  document.getElementById("statusBadge").textContent = data.status || "On Time";
  document.getElementById("queueCount").textContent = q.length;

  document.querySelectorAll(".btn-status").forEach(b => {
    b.classList.toggle("active-status", b.dataset.status === (data.status || "On Time"));
  });

  const list = document.getElementById("queueList");
  if (!q.length) {
    list.innerHTML = '<li class="queue-empty">Queue is empty</li>';
  } else {
    list.innerHTML = q.map((t, i) => `
      <li class="queue-item">
        <div class="drag-handle"><span></span><span></span><span></span></div>
        <span class="queue-num">${i + 1}</span>
        <span class="queue-name">${t}</span>
        <div class="queue-actions">
          <button class="btn-serve-q" onclick="serveIndex(${i})">▶ Serve</button>
          <button class="btn-remove-q" onclick="removeIndex(${i})">✕</button>
        </div>
      </li>
    `).join("");
    const items = Array.from(list.querySelectorAll(".queue-item"));
    setupMouseDrag(items);
    setupTouchDrag(items);
  }

  renderAdminMenu(menu);
});
</script>
</body>
</html>
